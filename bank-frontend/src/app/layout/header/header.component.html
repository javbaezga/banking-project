<header class="app-header">
  <div class="app-header__logo">
    <button class="app-header__toggle" type="button" aria-label="Toggle sidebar" (click)="sidebarState.toggle()">
      @if (sidebarState.isCollapsed$ | async) {
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="18" height="18" rx="2"/>
          <path d="M9 3v18"/>
          <path d="M14 9l3 3-3 3"/>
        </svg>
      } @else {
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="18" height="18" rx="2"/>
          <path d="M9 3v18"/>
          <path d="M14 15l-3-3 3-3"/>
        </svg>
      }
    </button>
    <a class="app-header__title" routerLink="/home" aria-label="Go to home">BANK</a>
  </div>
</header>
